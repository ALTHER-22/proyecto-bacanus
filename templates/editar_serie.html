{% extends 'base.html' %}
{% block title %}Editar | Admin{% endblock %}
{% block content %}
<div class="form-page">
    <h1>Editar Serie</h1>
    <form method="POST" class="ep-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
            <label>Categoría</label>
            <select name="categoria" style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px 16px;color:var(--text);font-family:var(--font-body);font-size:0.95rem;">
                <option value="serie" {% if serie['categoria']=='serie' %}selected{% endif %}>Serie</option>
                <option value="pelicula" {% if serie['categoria']=='pelicula' %}selected{% endif %}>Película</option>
                <option value="anime" {% if serie['categoria']=='anime' %}selected{% endif %}>Anime</option>
            </select>
        </div>
        <div class="form-group"><label>Nombre</label><input type="text" name="titulo" required value="{{ serie['titulo'] }}"></div>
        <div class="form-group"><label>Descripción</label><textarea name="descripcion" rows="3">{{ serie['descripcion'] or '' }}</textarea></div>
        <div class="form-group"><label>URL de portada</label><input type="text" name="miniatura" value="{{ serie['miniatura'] or '' }}"></div>
        <div class="form-group"><label>Orden</label><input type="number" name="orden" value="{{ serie['orden'] }}"></div>
        <div class="form-actions"><button type="submit" class="btn-guardar">Guardar</button><a href="/admin" class="btn-cancelar">Cancelar</a></div>
    </form>
</div>
{% endblock %}
