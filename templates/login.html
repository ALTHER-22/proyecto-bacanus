{% extends 'base.html' %}
{% block title %}Acceso Admin | Bacanus{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-box">
        <h1 class="login-title">ADMIN</h1>
        <p class="login-sub">Acceso restringido</p>
        {% if error %}<p class="login-error">{{ error }}</p>{% endif %}
        <form method="POST" class="login-form">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="usuario" required autofocus>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-guardar" style="width:100%">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
