{% extends 'base.html' %}
{% block title %}Nueva Serie | Admin{% endblock %}
{% block content %}
<div class="form-page">
    <h1>Nueva Serie</h1>
    <form method="POST" class="ep-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
            <label>Categoría</label>
            <select name="categoria" style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px 16px;color:var(--text);font-family:var(--font-body);font-size:0.95rem;">
                <option value="serie">Serie</option>
                <option value="pelicula">Película</option>
                <option value="anime">Anime</option>
            </select>
        </div>
        <div class="form-group"><label>Nombre</label><input type="text" name="titulo" required placeholder="Ej: Zero no Tsukaima"></div>
        <div class="form-group"><label>Descripción</label><textarea name="descripcion" rows="3" placeholder="De qué trata..."></textarea></div>
        <div class="form-group"><label>URL de imagen de portada</label><input type="text" name="miniatura" placeholder="https://imagen.com/portada.jpg"></div>
        <div class="form-group"><label>Orden</label><input type="number" name="orden" value="0"></div>
        <div class="form-actions"><button type="submit" class="btn-guardar">Crear</button><a href="/admin" class="btn-cancelar">Cancelar</a></div>
    </form>
</div>
{% endblock %}
